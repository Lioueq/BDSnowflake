services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petstore
    ports:
      - "5432:5432"
    volumes:  
      - ./sql:/docker-entrypoint-initdb.d
      - ./исходные данные:/seed
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
